apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequirelabels
  annotations:
    description: >
      Requires app, team, and environment labels on all pods.
      These labels are used for cost attribution, alert routing, and
      identifying ownership during incidents.
spec:
  crd:
    spec:
      names:
        kind: K8sRequireLabels
      validation:
        openAPIV3Schema:
          type: object
          properties:
            requiredLabels:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequirelabels

        violation[{"msg": msg}] {
          provided := {label | input.review.object.metadata.labels[label]}
          required := {label | label := input.parameters.requiredLabels[_]}
          missing := required - provided
          count(missing) > 0
          msg := sprintf("pod is missing required labels: %v", [missing])
        }
