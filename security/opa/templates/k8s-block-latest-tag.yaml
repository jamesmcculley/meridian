apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sblockatesttag
  annotations:
    description: >
      Blocks pods using :latest image tags or images with no tag at all.
      Forces explicit version pinning — critical for reproducible deployments
      and for Trivy to scan a meaningful image.
spec:
  crd:
    spec:
      names:
        kind: K8sBlockLatestTag
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sblocklatestag

        violation[{"msg": msg}] {
          c := input_containers[_]
          endswith(c.image, ":latest")
          msg := sprintf("container %v: :latest tag is not allowed — pin to a specific version", [c.name])
        }

        # no tag at all is equivalent to :latest
        violation[{"msg": msg}] {
          c := input_containers[_]
          not contains(c.image, ":")
          msg := sprintf("container %v: image has no tag — pin to a specific version", [c.name])
        }

        # digest-pinned images (sha256:...) are always fine — no violation for those
        # the endswith check handles the :latest case, not digest refs

        input_containers[c] {
          c := input.review.object.spec.containers[_]
        }

        input_containers[c] {
          c := input.review.object.spec.initContainers[_]
        }
