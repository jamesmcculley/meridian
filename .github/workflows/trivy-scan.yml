name: Trivy Security Scan

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write  # needed to upload SARIF to the Security tab

jobs:
  trivy-fs:
    name: Filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          trivy-config: security/trivy/trivy.yaml

      - name: Upload filesystem scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  trivy-image:
    name: Image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # build-sign.yml only triggers on main pushes to tools/meridian-detect/ — so on most PRs
      # there's no new image to scan. Scanning :latest keeps us honest between builds.
      # The image scan is informational for PRs because :latest may not exist yet, may
      # not be public, or may represent main rather than the PR. The fs scan remains
      # the hard vulnerability gate for proposed changes.
      - name: Run image scan
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          scan-type: image
          image-ref: ghcr.io/jamesmcculley/meridian-detect:latest
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          trivy-config: security/trivy/trivy.yaml

      - name: Upload image scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-image.sarif') != ''
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  trivy-config:
    name: Config scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: CRITICAL,HIGH
          # not failing on config findings yet — getting a baseline first before
          # deciding which misconfig categories to enforce as hard gates
          exit-code: "0"
          trivy-config: security/trivy/trivy.yaml

      - name: Upload config scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config
          # TODO: flip exit-code to "1" once we've reviewed the initial config findings
          # and filtered out any patterns we're intentionally accepting
