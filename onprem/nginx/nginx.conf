events {
  worker_connections 1024;
}

http {
  ssl_certificate     /certs/meridian.local.pem;
  ssl_certificate_key /certs/meridian.local-key.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  # Docker internal DNS resolver
  resolver 127.0.0.11 valid=30s ipv6=off;

  server {
    listen 7280 ssl;
    server_name quickwit.meridian.local;

    location / {
      set $upstream http://quickwit:7280;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  server {
    listen 3000 ssl;
    server_name grafana.meridian.local;

    location / {
      set $upstream http://grafana:3000;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  server {
    listen 16686 ssl;
    server_name jaeger.meridian.local;

    location / {
      set $upstream http://jaeger:16686;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  server {
    listen 9093 ssl;
    server_name alertmanager.meridian.local;

    location / {
      set $upstream http://alertmanager:9093;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
