global:
  scrape_interval: 15s

scrape_configs:
  - job_name: node
    scheme: https
    tls_config:
      ca_file:     /certs/rootCA.pem
      cert_file:   /certs/meridian.local.pem
      key_file:    /certs/meridian.local-key.pem
      server_name: node-exporter.meridian.local
    static_configs:
      - targets: [node-exporter:9100]

  - job_name: victoriametrics
    scheme: https
    tls_config:
      ca_file:     /certs/rootCA.pem
      cert_file:   /certs/meridian.local.pem
      key_file:    /certs/meridian.local-key.pem
      server_name: victoriametrics.meridian.local
    static_configs:
      - targets: [victoriametrics:8428]

  - job_name: quickwit
    scheme: https
    tls_config:
      ca_file:     /certs/rootCA.pem
      server_name: quickwit.meridian.local
    static_configs:
      - targets: [nginx:7280]
